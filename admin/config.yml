backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: vi

collections:
  - name: "settings"
    label: "⚙️ Cài đặt trang web"
    files:
      - name: "images"
        label: "📝 Quản lý Nội dung & Hình ảnh"
        file: "config.json"
        format: json
        fields:
          # =========================================================
          # 📑 PHẦN CHỈNH SỬA CHỮ (TEXT FIELDS)
          # =========================================================
          - label: "📌 [TEXT] Tiêu đề phụ Banner (Pill đầu trang)"
            name: "text_hero_pill"
            widget: "string"
            default: "Vietkite Travel · Thành lập 02/11/2011"

          - label: "📌 [TEXT] Tiêu đề chính Hero (Dòng 1)"
            name: "text_hero_title_1"
            widget: "string"
            default: "Tour đoàn riêng"

          - label: "📌 [TEXT] Tiêu đề chính Hero (Dòng chữ Nghiêng/Cam)"
            name: "text_hero_title_accent"
            widget: "string"
            default: "cao cấp"

          - label: "📌 [TEXT] Tiêu đề chính Hero (Dòng 3)"
            name: "text_hero_title_2"
            widget: "string"
            default: "theo yêu cầu"

          - label: "📌 [TEXT] Đoạn mô tả ngắn đầu trang"
            name: "text_hero_desc"
            widget: "text"
            default: "Lịch trình linh hoạt, dịch vụ đẳng cấp — chúng tôi lo trọn gói từ A đến Z để đoàn của bạn có chuyến đi thực sự đáng nhớ."

          - label: "📞 [HOTLINE] Số điện thoại chính toàn trang (Viết liền, ví dụ: 0914278879)"
            name: "text_hotline"
            widget: "string"
            default: "0914278879"

          - label: "📞 [HOTLINE] Định dạng hiển thị (Ví dụ: 0914.27.88.79)"
            name: "text_hotline_display"
            widget: "string"
            default: "0914.27.88.79"

          - label: "📊 [THỐNG KÊ] Số năm kinh nghiệm (Ví dụ: 14+)"
            name: "text_stat_years"
            widget: "string"
            default: "14+"

          - label: "📊 [THỐNG KÊ] Số đoàn đã phục vụ (Ví dụ: 500+)"
            name: "text_stat_tours"
            widget: "string"
            default: "500+"

          # =========================================================
          # 🖼️ PHẦN QUẢN LÝ HÌNH ẢNH
          # =========================================================
          - label: "🏔️ Ảnh Hero – Banner đầu trang (ảnh nền lớn)"
            name: "hero_bg"
            widget: "image"

          - label: "🌄 Ảnh Banner giữa trang 1 (Mỗi chuyến đi là một kỷ niệm)"
            name: "imgband1"
            widget: "image"

          - label: "🌅 Ảnh Banner giữa trang 2 (Lịch trình chi tiết)"
            name: "imgband2"
            widget: "image"

          - label: "🏢 Ảnh mục 'Tại sao chọn chúng tôi'"
            name: "why_img"
            widget: "image"

          - label: "🗺️ Mosaic 1 – Ảnh lớn bên trái (Tour đoàn)"
            name: "mosaic_1"
            widget: "image"

          - label: "🌊 Mosaic 2 – Đà Nẵng / Hội An"
            name: "mosaic_2"
            widget: "image"

          - label: "🏖️ Mosaic 3 – Phú Quốc"
            name: "mosaic_3"
            widget: "image"

          - label: "👨‍👩‍👧‍👦 Mosaic 4 – Tour gia đình"
            name: "mosaic_4"
            widget: "image"

          - label: "⛵ Mosaic 5 – Hạ Long"
            name: "mosaic_5"
            widget: "image"

          - label: "🏛️ Tour 1 – Huế – Đà Nẵng – Hội An"
            name: "tour_1"
            widget: "image"

          - label: "🌴 Tour 2 – Phú Quốc"
            name: "tour_2"
            widget: "image"

          - label: "🚢 Tour 3 – Hà Nội – Hạ Long"
            name: "tour_3"
            widget: "image"

          - label: "🌊 Tour 4 – Quy Nhơn"
            name: "tour_4"
            widget: "image"

          - label: "⛰️ Tour 5 – Sa Pa"
            name: "tour_5"
            widget: "image"

          - label: "🌫️ Tour 6 – Đà Lạt"
            name: "tour_6"
            widget: "image"

          - label: "⭐ Ảnh đánh giá 1 (Chị Thanh)"
            name: "review_1"
            widget: "image"

          - label: "⭐ Ảnh đánh giá 2 (Gia đình chị Hòa)"
            name: "review_2"
            widget: "image"

          - label: "⭐ Ảnh đánh giá 3 (Anh Nhân)"
            name: "review_3"
            widget: "image"
