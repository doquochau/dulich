<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Đoàn Riêng Cao Cấp – Vietkite Travel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
// Load images and text from config.json (updated by CMS)
(function(){
  fetch('/config.json?v=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(cfg){
      // 1. Đổ dữ liệu ẢNH
      document.querySelectorAll('[data-img-bg]').forEach(function(el){
        var key = el.getAttribute('data-img-bg');
        if(cfg[key]) el.style.backgroundImage = "url('" + cfg[key] + "')";
      });
      document.querySelectorAll('[data-img-src]').forEach(function(el){
        var key = el.getAttribute('data-img-src');
        if(cfg[key]) el.src = cfg[key];
      });

      // 2. Đổ dữ liệu CHỮ TEXT
      document.querySelectorAll('[data-cms-text]').forEach(function(el){
        var key = el.getAttribute('data-cms-text');
        if(cfg[key]) el.innerText = cfg[key];
      });

      // 3. Xử lý các link Hotline gọi điện trực tiếp
      if(cfg['text_hotline']) {
        document.querySelectorAll('[data-cms-href-tel]').forEach(function(el){
          el.href = "tel:" + cfg['text_hotline'];
        });
      }
    })
    .catch(function(){});
})();
</script>
<style>
:root{
  --g:#1a7a3c;--gl:#22a350;--gp:#e8f5ed;--gm:#c8e8d4;
  --o:#e8610a;--ol:#f57c35;--op:#fff3ec;
  --w:#ffffff;--dark:#0b1a0e;
  --t1:#0f2416;--t2:#3d6047;--t3:#7a9982;
  --b:#dde8e1;--b2:#c4d9cb;
  --fd:'Playfair Display',serif;--fb:'Be Vietnam Pro',sans-serif;
  --s1:0 2px 12px rgba(26,122,60,.07);
  --s2:0 8px 32px rgba(26,122,60,.11);
  --s3:0 20px 60px rgba(26,122,60,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html, body {
  overflow-x: hidden;
  width: 100%;
  margin: 0;
  padding: 0;
  scroll-behavior: smooth;
}
body{font-family:var(--fb);background:var(--w);color:var(--t1)}
img{display:block}

/* ═══ NAV ═══ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 52px;height:70px;
  background:rgba(255,255,255,.93);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--b);
  transition:box-shadow .4s
}
.nav.scrolled{box-shadow:0 4px 24px rgba(26,122,60,.09)}
.nav-logo{
  display:flex;align-items:center;
  padding:4px;border-radius:10px;
  border:1.5px solid rgba(0,0,0,0.12);
  background:rgba(255,255,255,0.85);
  box-shadow:0 1px 8px rgba(0,0,0,0.08);
  transition:opacity .2s;
  opacity:0.88;
}
.nav-logo:hover{opacity:1}
.nav-logo img{height:40px;width:auto;object-fit:contain;display:block}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{
  color:var(--t2);text-decoration:none;font-size:14px;font-weight:500;
  letter-spacing:.2px;transition:color .2s;position:relative
}
.nav-links a:not(.nav-cta)::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;
  height:1.5px;background:var(--o);border-radius:999px;
  transform:scaleX(0);transform-origin:left;transition:transform .25s
}
.nav-links a:not(.nav-cta):hover{color:var(--g)}
.nav-links a:not(.nav-cta):hover::after{transform:scaleX(1)}
.nav-cta{
  background:var(--o) !important;color:var(--w) !important;
  padding:10px 24px;border-radius:999px;font-weight:600 !important;
  transition:background .2s,transform .15s,box-shadow .2s !important;
  box-shadow:0 4px 16px rgba(232,97,10,.3)
}
.nav-cta:hover{background:var(--ol) !important;transform:translateY(-1px);box-shadow:0 6px 22px rgba(232,97,10,.42) !important}
.nav-cta::after{display:none !important}
.hbg{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px}
.hbg span{display:block;width:22px;height:1.8px;background:var(--t1);border-radius:2px;transition:all .3s}
.mmenu{
  display:none;position:fixed;top:70px;left:0;right:0;
  background:var(--w);padding:18px 24px 28px;z-index:999;
  border-bottom:1px solid var(--b);box-shadow:var(--s2)
}
.mmenu.open{display:block}
.mmenu ul{list-style:none;display:flex;flex-direction:column}
.mmenu li a{display:block;padding:12px 0;color:var(--t2);font-size:15px;font-weight:500;text-decoration:none;border-bottom:1px solid var(--b)}
.mmenu-cta{
  display:block;text-align:center;margin-top:18px;
  background:var(--o);color:var(--w);padding:14px;
  border-radius:12px;font-weight:600;font-size:14px;text-decoration:none
}

/* ═══ HERO ═══ */
.hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;overflow:hidden
}
.hero-bg{
  position:absolute;inset:0;
  background-image:url('https://i.imgur.com/qR6teQt.jpeg');
  background-size:cover;background-position:center top;
  animation:hzoom 22s ease-in-out infinite alternate
}
@keyframes hzoom{from{transform:scale(1.0)}to{transform:scale(1.07)}}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(105deg,
    rgba(6,18,9,.90) 0%,
    rgba(6,18,9,.75) 45%,
    rgba(15,45,22,.50) 75%,
    rgba(15,45,22,.35) 100%)
}
.hero-content{
  position:relative;z-index:2;
  max-width:680px;padding:120px 52px 200px;
  opacity:0;animation:hIn .9s .3s cubic-bezier(.22,1,.36,1) forwards
}
@keyframes hIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.hero-pill{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.09);
  backdrop-filter:blur(10px);
  color:rgba(255,255,255,.88);font-size:11px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;
  padding:8px 20px;border-radius:999px;margin-bottom:28px
}
.hero-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ol);box-shadow:0 0 8px rgba(245,124,53,.8)}
.hero h1{
  font-family:var(--fd);
  font-size:clamp(42px,5.8vw,74px);font-weight:800;
  color:var(--w);line-height:1.08;letter-spacing:-.5px;
  margin-bottom:22px
}
.hero h1 .accent{color:#ffa94d;font-style:italic;font-weight:700}
.hero-line{
  width:56px;height:3px;border-radius:99px;
  background:linear-gradient(to right,var(--o),var(--ol));
  margin-bottom:22px
}
.hero-desc{
  font-size:16.5px;color:rgba(255,255,255,.80);
  line-height:1.8;margin-bottom:40px;font-weight:300;max-width:520px
}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn-primary{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--o);color:var(--w);
  padding:15px 32px;border-radius:999px;
  font-size:15px;font-weight:600;text-decoration:none;border:none;cursor:pointer;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 6px 24px rgba(232,97,10,.4)
}
.btn-primary:hover{background:var(--ol);transform:translateY(-2px);box-shadow:0 10px 32px rgba(232,97,10,.5)}
.btn-outline-w{
  display:inline-flex;align-items:center;gap:9px;
  background:transparent;color:var(--w);
  padding:14px 28px;border-radius:999px;
  font-size:15px;font-weight:500;text-decoration:none;border:1.5px solid rgba(255,255,255,.42);cursor:pointer;
  transition:background .2s,border-color .2s,transform .15s;
  backdrop-filter:blur(6px)
}
.btn-outline-w:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.7);transform:translateY(-2px)}
.hero-stats{
  position:absolute;bottom:0;left:0;right:0;z-index:2;
  background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.12)
}
.hero-stats-inner{
  max-width:960px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr)
}
.hstat{
  padding:22px 20px;text-align:center;
  border-right:1px solid rgba(255,255,255,.1)
}
.hstat:last-child{border-right:none}
.hstat-num{font-family:var(--fd);font-size:34px;font-weight:700;color:var(--w);line-height:1;margin-bottom:4px}
.hstat-lbl{font-size:11.5px;color:rgba(255,255,255,.6);letter-spacing:.5px;font-weight:400}

/* ═══ SERVICES ═══ */
.sec-wrap{padding:96px 24px}
.sec-wrap.bg-pale{background:var(--gp)}
.sec-wrap.bg-white{background:var(--w)}
.sec-inner{max-width:1040px;margin:0 auto}
.sec-kicker{
  display:inline-flex;align-items:center;gap:10px;
  font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--o);margin-bottom:12px
}
.sec-kicker::before{content:'';width:28px;height:2px;background:var(--g);border-radius:99px}
.sec-h{
  font-family:var(--fd);
  font-size:clamp(30px,4vw,48px);font-weight:700;
  color:var(--t1);line-height:1.15;margin-bottom:14px;letter-spacing:-.3px
}
.sec-p{font-size:15.5px;color:var(--t2);line-height:1.8;max-width:540px;margin-bottom:56px;font-weight:300}

/* Cards grid */
.srv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1px;background:var(--b);border:1px solid var(--b);border-radius:20px;overflow:hidden}
.srv-card{
  background:var(--w);padding:36px 32px;
  opacity:0;transform:translateY(18px);
  transition:background .25s
}
.srv-card.vis{animation:up .5s forwards}
.srv-card:hover{background:#f9fdfb}
.srv-icon{
  width:56px;height:56px;border-radius:18px;
  background:var(--gp);border:1px solid var(--gm);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin-bottom:22px;
  transition:transform .3s
}
.srv-card:hover .srv-icon{transform:scale(1.1) rotate(-4deg)}
.srv-card h3{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--t1);margin-bottom:10px;letter-spacing:-.2px}
.srv-card p{font-size:13.5px;color:var(--t2);line-height:1.75;font-weight:300}

/* ═══ FULLWIDTH IMAGE BAND ═══ */
.imgband{
  position:relative;height:480px;overflow:hidden;
  display:flex;align-items:center;justify-content:center
}
.imgband-bg{
  position:absolute;inset:0;background-size:cover;background-position:center;
  transition:transform .6s
}
.imgband:hover .imgband-bg{transform:scale(1.04)}
.imgband-overlay{position:absolute;inset:0;background:rgba(8,24,12,.52)}
.imgband-content{
  position:relative;z-index:2;text-align:center;padding:0 24px;
  max-width: 900px;
}
.imgband-content h2{
  font-family:var(--fd);font-size:clamp(32px,4.5vw,56px);font-weight:700;
  color:var(--w);line-height:1.12;margin-bottom:18px;letter-spacing:-.4px
}
.imgband-content p{font-size:16px;color:rgba(255,255,255,.82);line-height:1.75;font-weight:300;margin-bottom:30px}

/* ═══ PHOTO MOSAIC ═══ */
.mosaic{
  max-width:1040px;margin:0 auto;padding:0 24px;
  display:grid;
  grid-template-columns:1.5fr 1fr 1fr;
  grid-template-rows:250px 250px;
  gap:10px
}
.mimg{border-radius:16px;overflow:hidden;position:relative}
.mimg:first-child{grid-row:1/3}
.mimg img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.mimg:hover img{transform:scale(1.06)}
.mimg-cap{
  position:absolute;bottom:0;left:0;right:0;
  padding:24px 16px 14px;
  background:linear-gradient(to top,rgba(8,24,12,.78) 0%,transparent 100%);
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,.9)
}

/* ═══ WHY US ═══ */
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.why-imgs{
  width: 100%;
  height: 452px;
}
.wimg{border-radius:20px;overflow:hidden;background:var(--gp);height:100%}
.wimg img{width:100%;height:100%;object-fit:cover;display:block}
.why-list{display:flex;flex-direction:column;gap:24px;margin-top:40px}
.witem{display:flex;gap:16px;align-items:flex-start;opacity:0;transform:translateX(16px)}
.witem.vis{animation:fromRight .5s forwards}
@keyframes fromRight{to{opacity:1;transform:none}}
.wnum{
  width:46px;height:46px;border-radius:14px;flex-shrink:0;
  background:var(--g);display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:20px;font-weight:700;color:var(--w);
  box-shadow:0 6px 18px rgba(26,122,60,.3)
}
.witem h4{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:5px}
.witem p{font-size:13.5px;color:var(--t2);line-height:1.7;font-weight:300}

/* ═══ TOURS ═══ */
.tours-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px}
.tcard{
  border-radius:20px;overflow:hidden;
  border:1px solid var(--b);background:var(--w);
  opacity:0;transform:translateY(18px);
  transition:transform .3s,box-shadow .3s,border-color .3s
}
.tcard.vis{animation:up .5s forwards}
.tcard:hover{transform:translateY(-7px);box-shadow:var(--s3);border-color:var(--gm)}
.tc-img{height:200px;overflow:hidden;position:relative}
.tc-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.tcard:hover .tc-img img{transform:scale(1.08)}
.tc-badge{
  position:absolute;top:14px;left:14px;
  background:var(--o);color:var(--w);
  font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:5px 13px;border-radius:999px
}
.tc-body{padding:22px 22px 18px}
.tc-name{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--t1);margin-bottom:6px;letter-spacing:-.2px}
.tc-meta{font-size:12.5px;color:var(--t3);margin-bottom:0;font-weight:400}
.tc-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px 18px;border-top:1px solid var(--b)
}
.tc-price{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--g);letter-spacing:-.2px}
.tc-price small{font-family:var(--fb);font-size:11px;color:var(--t3);font-weight:400}
.tc-btn{
  background:var(--gp);color:var(--g);border:none;cursor:pointer;
  padding:9px 18px;border-radius:99px;
  font-size:13px;font-weight:600;font-family:var(--fb);
  transition:background .2s,transform .15s
}
.tc-btn:hover{background:var(--gm);transform:scale(1.04)}

/* ═══ PROCESS ═══ */
.process-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:60px;position:relative}
.process-grid::before{
  content:'';position:absolute;top:36px;
  left:calc(12.5% + 18px);right:calc(12.5% + 18px);
  height:1px;background:linear-gradient(to right,var(--gl),var(--o));z-index:0
}
.pstep{
  display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:0 14px;z-index:1;opacity:0;transform:translateY(16px)
}
.pstep.vis{animation:up .5s forwards}
.pring{
  width:72px;height:72px;border-radius:50%;
  border:1.5px solid var(--gl);background:var(--w);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:28px;font-weight:700;color:var(--g);
  margin-bottom:20px;transition:all .3s;
  box-shadow:var(--s1)
}
.pstep:hover .pring{background:var(--g);color:var(--w);border-color:var(--g);box-shadow:0 8px 28px rgba(26,122,60,.35)}
.pstep h4{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:8px}
.pstep p{font-size:13px;color:var(--t2);line-height:1.7;font-weight:300}

/* ═══ REVIEWS ═══ */
.rev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
.rcard{
  background:var(--w);border:1px solid var(--b);border-radius:20px;padding:0;
  overflow:hidden;opacity:0;transform:translateY(16px);
  transition:transform .3s,box-shadow .3s
}
.rcard.vis{animation:up .55s forwards}
.rcard:hover{transform:translateY(-5px);box-shadow:var(--s2)}
.rcard-img{height:170px;overflow:hidden}
.rcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.rcard:hover .rcard-img img{transform:scale(1.05)}
.rcard-body{padding:22px 24px}
.stars{display:flex;gap:4px;margin-bottom:14px}
.star{width:13px;height:13px;background:var(--o);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.rtext{font-size:13.5px;color:var(--t2);line-height:1.75;margin-bottom:18px;font-style:italic;font-weight:300}
.rreviewer{display:flex;align-items:center;gap:12px}
.ravatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--g),var(--gl));
  display:flex;align-items:center;justify-content:center;
  color:var(--w);font-size:13px;font-weight:700
}
.rname{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:2px}
.rsub{font-size:11.5px;color:var(--t3)}

/* ═══ CTA BAND ═══ */
.cta-band{
  position:relative;overflow:hidden;
  background-image:url('https://vietkite.com.vn/wp-content/uploads/2025/09/bg-3.png');
  background-size:cover;background-position:center;
  padding:100px 24px;text-align:center
}
.cta-band::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(8,32,14,.88) 0%,rgba(15,55,26,.82) 100%)
}
.cta-inner{position:relative;z-index:2;max-width:640px;margin:0 auto}
.cta-inner h2{
  font-family:var(--fd);font-size:clamp(30px,4.5vw,52px);font-weight:700;
  color:var(--w);margin-bottom:14px;letter-spacing:-.4px;line-height:1.12
}
.cta-inner p{font-size:16px;color:rgba(255,255,255,.78);margin-bottom:42px;font-weight:300;line-height:1.75}
.cta-reg-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--w);color:var(--g);
  padding:18px 40px;border-radius:999px;font-size:16px;font-weight:700;
  border:none;cursor:pointer;margin-bottom:42px;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 8px 32px rgba(0,0,0,.25)
}
.cta-reg-btn:hover{transform:translateY(-3px);box-shadow:0 14px 42px rgba(0,0,0,.35)}
.cta-contacts{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.ccard{
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:16px;padding:18px 24px;text-decoration:none;
  transition:background .2s,transform .2s;backdrop-filter:blur(8px)
}
.ccard:hover{background:rgba(255,255,255,.18);transform:translateY(-3px)}
.cicon{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px
}
.ci-phone{background:var(--o)}
.ci-mail{background:rgba(255,255,255,.15)}
.ci-web{background:rgba(255,255,255,.1)}
.clbl{font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.55);margin-bottom:3px;text-transform:uppercase}
.cval{font-size:15.5px;font-weight:700;color:var(--w)}

/* ═══ FOOTER ═══ */
footer{background:#070f09;padding:60px 24px 0;border-top:1px solid rgba(255,255,255,.05)}
.foot-inner{
  max-width:1040px;margin:0 auto;
  display:grid;grid-template-columns:1.8fr 1fr;gap:80px;
  padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,.07)
}
.flogo-img{height:52px;width:auto;object-fit:contain;margin-bottom:16px}
.fslogan">Đồng hành cùng bạn trong mọi chuyến đi</p>

<script>
const nav = document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>60));

function toggleM(){document.getElementById('mmenu').classList.toggle('open')}
function closeM(){document.getElementById('mmenu').classList.remove('open')}

const obs = new IntersectionObserver(es=>{
  es.forEach(e=>{
    if(!e.isIntersecting) return;
    const el=e.target, sibs=[...el.parentElement.querySelectorAll('[data-anim]')];
    el.style.animationDelay=(sibs.indexOf(el)*.1)+'s';
    el.classList.add('vis');obs.unobserve(el);
  });
},{threshold:.1});
document.querySelectorAll('[data-anim]').forEach(el=>obs.observe(el));

const obsR = new IntersectionObserver(es=>{
  es.forEach(e=>{
    if(!e.isIntersecting) return;
    const el=e.target, sibs=[...el.parentElement.querySelectorAll('[data-anwr]')];
    el.style.animationDelay=(sibs.indexOf(el)*.12)+'s';
    el.classList.add('vis');obsR.unobserve(el);
  });
},{threshold:.12});
document.querySelectorAll('[data-anwr]').forEach(el=>obsR.observe(el));

document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{
    const t=document.querySelector(a.getAttribute('href'));
    if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'})}
  });
});

function openMod(){
  document.getElementById('moverlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('fbody').style.display='block';
  document.getElementById('mfooter').style.display='block';
  document.getElementById('sbox').style.display='none';
}
function closeMod(){
  document.getElementById('moverlay').classList.remove('open');
  document.body.style.overflow='';
}
function handleOvClick(e){if(e.target===document.getElementById('moverlay'))closeMod();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMod();});

function submitF(){
  var hoTen = document.getElementById('fn').value.trim();
  var dienThoai = document.getElementById('fp').value.trim();
  
  if(!hoTen || !dienThoai){
    alert('Vui lòng nhập họ tên và số điện thoại để chúng tôi liên hệ lại.');
    return;
  }
  
  var btnSubmit = document.querySelector('.btn-submit');
  var originalText = btnSubmit.innerHTML;
  btnSubmit.innerHTML = "Đang gửi yêu cầu...";
  btnSubmit.disabled = true;

  var loaiHinhArray = [];
  document.querySelectorAll('.cb-loaihinh:checked').forEach(function(cb) {
      loaiHinhArray.push(cb.value);
  });
  var loaiHinhSelected = loaiHinhArray.join(', ');

  var formData = {
    "HoTen": hoTen,
    "DienThoai": dienThoai,
    "Email": document.getElementById('fe').value.trim(),
    "CongTy": document.getElementById('fc').value.trim(),
    "LoaiNhom": document.getElementById('ftype').value,
    "SoLuong": document.getElementById('fcount').value,
    "DiemDen": document.getElementById('fdest').value.trim(),
    "NgayKhoiHanh": document.getElementById('fdate').value,
    "ThoiGianTour": document.getElementById('fdur').value,
    "NganSach": document.getElementById('fbudget').value,
    "LoaiHinhQuanTam": loaiHinhSelected,
    "GhiChu": document.getElementById('fnote').value.trim()
  };

  var scriptUrl = "https://script.google.com/macros/s/AKfycbxwYLXluZEv9TGISd3W0UCAVh8luQoBwU7WiUUd1fbgbk4BzjLPvf47R_fGVGwuGfRKFw/exec";

  fetch(scriptUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(formData)
  })
  .then(function() {
    document.getElementById('fbody').style.display='none';
    document.getElementById('mfooter').style.display='none';
    document.getElementById('sbox').style.display='block';
    
    document.getElementById('fn').value = '';
    document.getElementById('fp').value = '';
    document.getElementById('fe').value = '';
    document.getElementById('fc').value = '';
    document.getElementById('ftype').value = '';
    document.getElementById('fcount').value = '';
    document.getElementById('fdest').value = '';
    document.getElementById('fdate').value = '';
    document.getElementById('fdur').value = '';
    document.getElementById('fbudget').value = '';
    document.querySelectorAll('.cb-loaihinh').forEach(function(el) { el.checked = false; });
  })
  .catch(function(error) {
    console.error('Lỗi:', error);
    alert('Có lỗi xảy ra trong quá trình gửi. Vui lòng thử lại hoặc gọi hotline.');
  })
  .finally(function() {
    btnSubmit.innerHTML = originalText;
    btnSubmit.disabled = false;
  });
}
</script>
